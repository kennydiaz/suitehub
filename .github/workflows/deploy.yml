name: Deploy suitehub.net a Hostinger

# Build estatico (Astro) + rsync por SSH a public_html.
# IMPORTANTE: public_html es COMPARTIDO con las apps PHP (carwash, royalcar,
# panel, core, lite, pro, beauty, taller, pet, hotel, boutique...). Por eso
# NO se usa --delete: solo subimos/actualizamos los archivos del sitio y
# dejamos intactas las carpetas de las otras apps.
#
# Requiere los mismos secrets que los demas repos del hosting:
#   SSH_PRIVATE_KEY, SSH_USER, SSH_HOST

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-suitehub
  cancel-in-progress: false

env:
  SSH_PORT: "65002"
  SSH_OPTS: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  # Sin --delete a proposito (public_html compartido). Solo sincroniza el sitio.
  RSYNC_OPTS: "-rltvz --no-perms --omit-dir-times"

jobs:
  build-and-deploy:
    name: Build estatico y rsync a public_html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://suitehub.net

      - name: Configurar llave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via rsync (SSH)
        run: |
          rsync $RSYNC_OPTS -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key $SSH_OPTS" \
            ./dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u525838892/domains/suitehub.net/public_html/"
