name: Deploy suitehub.net a Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-suitehub
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build estatico y FTP a public_html
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_SITE_URL: https://suitehub.net

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          protocol: ftps
          port: 21
          timeout: 60000
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
